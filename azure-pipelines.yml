# Bentley iTwin Operations Center — Azure Pipelines CI
# Runs unit tests and import check on every push to main.
# Extend with a Deploy stage for AKS/Helm release.

trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: '3.12'

steps:
- task: UsePythonVersion@0
  inputs:
    versionSpec: $(pythonVersion)
  displayName: 'Use Python $(pythonVersion)'

- script: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
    pip install pytest pytest-asyncio pytest-cov
  displayName: 'Install dependencies'

- script: |
    python -c "from app.main import app; print('Import OK')"
  env:
    DATABASE_URL: sqlite+aiosqlite:///./ci_test.db
    SECRET_KEY: ci-test-secret-key-min-32-characters-long
  displayName: 'Smoke import check'

- script: |
    pytest tests/ -v --tb=short
  env:
    DATABASE_URL: sqlite+aiosqlite:///./ci_test.db
    SECRET_KEY: ci-test-secret-key-min-32-characters-long
  displayName: 'Run tests'
