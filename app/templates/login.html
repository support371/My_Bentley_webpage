<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — iTwin Operations Center</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="brand-icon-lg">⬡</span>
      <h1 class="auth-title">iTwin Operations Center</h1>
      <p class="auth-subtitle">Bentley Platform Intelligence</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form action="/login" method="post" class="auth-form">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-input" placeholder="admin@example.com" required autofocus />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <p class="auth-hint">
      Default: <code>admin@example.com</code> / <code>admin123</code><br/>
      Change these via <code>INITIAL_ADMIN_EMAIL</code> / <code>INITIAL_ADMIN_PASSWORD</code> env vars.
    </p>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
