{% extends "base.html" %}
{% block title %}{{ code }} — {{ app_name }}{% endblock %}

{% block head %}
<style>
.error-page { display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:60vh; text-align:center; padding:2rem; }
.error-code { font-size:6rem; font-weight:900; letter-spacing:-.04em;
  background:linear-gradient(135deg, var(--primary), #8b5cf6);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; line-height:1; margin-bottom:.5rem; }
.error-title { font-size:1.4rem; font-weight:700; margin-bottom:.75rem; }
.error-msg { color:var(--text-muted); max-width:420px; margin-bottom:2rem; line-height:1.7; }
.error-actions { display:flex; gap:.75rem; flex-wrap:wrap; justify-content:center; }
.error-details { margin-top:2rem; padding:1rem 1.5rem; background:var(--bg-secondary);
  border-radius:var(--radius); border:1px solid var(--border); font-family:monospace;
  font-size:.8rem; color:var(--text-muted); max-width:600px; text-align:left; display:none; }
.error-details.show { display:block; }
</style>
{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-code">{{ code }}</div>
  <h1 class="error-title">{{ title }}</h1>
  <p class="error-msg">{{ message }}</p>
  <div class="error-actions">
    <a href="/dashboard" class="btn btn-primary">← Back to Dashboard</a>
    <a href="javascript:history.back()" class="btn btn-ghost">Go Back</a>
    {% if code == 500 %}
    <button class="btn btn-ghost" onclick="document.getElementById('errDetail').classList.toggle('show')">Show Details</button>
    {% endif %}
  </div>
  {% if detail %}
  <pre class="error-details" id="errDetail">{{ detail }}</pre>
  {% endif %}
</div>
{% endblock %}
