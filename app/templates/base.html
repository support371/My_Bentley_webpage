<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css" />
  {% block head %}{% endblock %}
</head>
<body>
<nav class="navbar">
  <a href="/dashboard" class="navbar-brand"><span class="brand-icon">IT</span><span class="brand-name">iTwin Ops</span></a>
  <div class="navbar-links">
    <a href="/dashboard" class="nav-link">Overview</a>
    <a href="/events-view" class="nav-link">Events</a>
    <a href="/itwins-view" class="nav-link">iTwins</a>
    <a href="/imodels-view" class="nav-link">iModels</a>
    <a href="/integrations" class="nav-link">Integrations</a>
    <a href="/admin" class="nav-link">Admin</a>
  </div>
  <div class="navbar-end"><button class="theme-toggle" onclick="toggleTheme()">Theme</button><a href="/login" class="btn-sm btn-primary">Sign in</a></div>
</nav>
<div class="page-container">
  {% block content %}{% endblock %}
</div>
<div id="toastContainer"></div>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
