<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>" />
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar">
  <a href="/dashboard" class="navbar-brand" style="text-decoration:none;color:inherit;">
    <span class="brand-icon">⬡</span>
    <span class="brand-name">iTwin Ops</span>
  </a>
  <div class="navbar-links">
    <a href="/dashboard" class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}">
      <span class="nav-icon">◈</span><span class="nav-label">Overview</span>
    </a>
    <a href="/events-view" class="nav-link {% if request.url.path == '/events-view' %}active{% endif %}">
      <span class="nav-icon">◉</span><span class="nav-label">Events</span>
    </a>
    <a href="/itwins-view" class="nav-link {% if request.url.path == '/itwins-view' %}active{% endif %}">
      <span class="nav-icon">◈</span><span class="nav-label">iTwins</span>
    </a>
    <a href="/imodels-view" class="nav-link {% if request.url.path == '/imodels-view' %}active{% endif %}">
      <span class="nav-icon">⬡</span><span class="nav-label">iModels</span>
    </a>
    <a href="/integrations" class="nav-link {% if request.url.path == '/integrations' %}active{% endif %}">
      <span class="nav-icon">🔌</span><span class="nav-label">Integrations</span>
    </a>
    <a href="/mobile/alarms" class="nav-link {% if request.url.path.startswith('/mobile') %}active{% endif %}">
      <span class="nav-icon">📱</span><span class="nav-label">Mobile Ops</span>
    </a>
    <a href="/admin" class="nav-link {% if request.url.path == '/admin' %}active{% endif %}">
      <span class="nav-icon">⚙</span><span class="nav-label">Admin</span>
    </a>
    <a href="/admin/launch-readiness" class="nav-link {% if request.url.path == '/admin/launch-readiness' %}active{% endif %}">
      <span class="nav-icon">🚀</span><span class="nav-label">Launch</span>
    </a>
    <a href="/control-plane" class="nav-link {% if request.url.path == '/control-plane' %}active{% endif %}">
      <span class="nav-icon">🛰</span><span class="nav-label">Control</span>
    </a>
  </div>
  <div class="navbar-end">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">◑</button>
    {% if user %}
      <span class="user-chip" title="{{ user.email }}">{{ user.get('email','')[:20] }}</span>
      <a href="/logout" class="btn-sm btn-ghost">Sign out</a>
    {% else %}
      <a href="/login" class="btn-sm btn-primary">Sign in</a>
    {% endif %}
  </div>
</nav>

<div class="page-container">
  {% block content %}{% endblock %}
</div>

<div id="toastContainer" style="
  position:fixed; bottom:1.5rem; right:1.5rem; z-index:9999;
  display:flex; flex-direction:column; gap:.5rem; pointer-events:none;
"></div>

<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
