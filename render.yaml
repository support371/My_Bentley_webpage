services:
  - type: web
    name: bentley-itwin-ops
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: COOKIE_SECURE
        value: true
      - key: SKIP_SIGNATURE_VERIFY
        value: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./itwin_ops.db
      - key: SECRET_KEY
        generateValue: true
      - key: WEBHOOK_SECRET
        generateValue: true
