parameters:
  - name: azureSubscriptionServiceConnection
    type: string
  - name: aksResourceGroup
    type: string
  - name: aksClusterName
    type: string
  - name: namespace
    type: string
  - name: releaseName
    type: string
  - name: chartPath
    type: string
  - name: imageRepository
    type: string
  - name: imageTag
    type: string
  - name: ingressHost
    type: string
  - name: existingSecret
    type: string

steps:
  - task: HelmInstaller@1
    displayName: Install Helm 3
    inputs:
      helmVersionToInstall: '3.15.4'

  - task: HelmDeploy@0
    displayName: Helm upgrade
    inputs:
      connectionType: 'Azure Resource Manager'
      azureSubscription: ${{ parameters.azureSubscriptionServiceConnection }}
      azureResourceGroup: ${{ parameters.aksResourceGroup }}
      kubernetesCluster: ${{ parameters.aksClusterName }}
      namespace: ${{ parameters.namespace }}
      command: upgrade
      chartType: FilePath
      chartPath: ${{ parameters.chartPath }}
      releaseName: ${{ parameters.releaseName }}
      install: true
      arguments: '--create-namespace --wait --timeout 10m'
      overrideValues: |
        image.repository=${{ parameters.imageRepository }}
        image.tag=${{ parameters.imageTag }}
        ingress.enabled=true
        ingress.hosts[0].host=${{ parameters.ingressHost }}
        existingSecret=${{ parameters.existingSecret }}

  - task: Kubernetes@1
    displayName: Verify rollout
    inputs:
      connectionType: 'Azure Resource Manager'
      azureSubscriptionEndpoint: ${{ parameters.azureSubscriptionServiceConnection }}
      azureResourceGroup: ${{ parameters.aksResourceGroup }}
      kubernetesCluster: ${{ parameters.aksClusterName }}
      namespace: ${{ parameters.namespace }}
      command: get
      arguments: 'pods -o wide'
