trigger:
  branches:
    include:
      - main
      - develop
      - feature/*

pr:
  branches:
    include:
      - main
      - develop

variables:
  vmImage: ubuntu-latest
  pythonVersion: '3.12'
  dockerfilePath: 'Dockerfile'
  chartPath: 'charts/bentley-fastapi'
  buildTag: '$(Build.SourceBranchName)-$(Build.BuildId)'
  imageRepository: 'bentley/my-bentley-webpage'
  containerRegistryServiceConnection: 'Bentley-ACR-ServiceConnection'
  azureSubscriptionServiceConnection: 'Bentley-AzureRM-ServiceConnection'
  aksResourceGroup: 'rg-bentley-platform'
  aksClusterName: 'aks-bentley-platform'
  namespace: 'bentley-prod'
  ingressHost: 'app.example.com'
  existingSecret: 'bentley-fastapi-prod-secrets'
  helmReleaseName: 'bentley-fastapi'
  acrLoginServer: 'REPLACE_WITH_ACR_LOGIN_SERVER'

stages:
  - stage: Validate
    jobs:
      - job: BackendValidation
        pool:
          vmImage: $(vmImage)
        steps:
          - template: templates/backend-ci.yml
            parameters:
              pythonVersion: $(pythonVersion)

  - stage: Containerize
    dependsOn: Validate
    jobs:
      - job: BuildPushImage
        pool:
          vmImage: $(vmImage)
        steps:
          - template: templates/containerize.yml
            parameters:
              containerRegistryServiceConnection: $(containerRegistryServiceConnection)
              repository: $(imageRepository)
              dockerfilePath: $(dockerfilePath)
              buildContext: '$(Build.SourcesDirectory)'
              tags: |
                $(buildTag)
                latest

  - stage: Deploy
    dependsOn: Containerize
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProd
        environment: 'bentley-prod'
        strategy:
          runOnce:
            deploy:
              pool:
                vmImage: $(vmImage)
              steps:
                - template: templates/deploy-aks.yml
                  parameters:
                    azureSubscriptionServiceConnection: $(azureSubscriptionServiceConnection)
                    aksResourceGroup: $(aksResourceGroup)
                    aksClusterName: $(aksClusterName)
                    namespace: $(namespace)
                    releaseName: $(helmReleaseName)
                    chartPath: $(chartPath)
                    imageRepository: '$(acrLoginServer)/$(imageRepository)'
                    imageTag: $(buildTag)
                    ingressHost: $(ingressHost)
                    existingSecret: $(existingSecret)
